apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mockops
  labels:
    {{- include "mockops.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mockops.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
